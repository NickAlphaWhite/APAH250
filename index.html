<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APAH 250 Progress</title>
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --gray: #86868b; --accent: #000000; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 40px 20px; background: var(--bg); }
        
        /* 进度条样式 */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 8px; background: #eee; z-index: 1000; }
        #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }
        .stats { font-family: "Georgia", serif; font-style: italic; font-size: 1.2rem; margin-bottom: 30px; }

        .container { max-width: 1100px; margin: 0 auto; }
        .section-title { border-bottom: 1px solid #eee; padding-bottom: 10px; margin: 50px 0 25px; font-size: 1.1rem; font-weight: 600; }
        
        /* 紧凑型画廊网格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        
        .card { text-decoration: none; color: inherit; font-size: 0.75rem; text-align: center; }
        .img-box { 
            width: 100%; aspect-ratio: 1; border: 1px dashed #ccc; border-radius: 4px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #fafafa; transition: all 0.2s;
        }
        .card.done .img-box { border: none; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .not-found { color: #ccc; font-size: 0.6rem; padding: 10px; }
        
        .card:hover .img-box { transform: scale(1.05); border-color: #000; }
    </style>
</head>
<body>

<div class="progress-container"><div id="progressBar"></div></div>

<div class="container">
    <div class="stats" id="counter">0/250</div>
    <h1 style="font-family: serif; font-size: 2.2rem;">Overview</h1>

    <div id="sections"></div>
</div>

<script>
    // 数据示例：增加 category 字段
    const artworks = [
        { id: "001", title: "Apollo 11 stones", cat: "Global Prehistory", img: "" },
        { id: "008", title: "Stonehenge", cat: "Global Prehistory", img: "https://example.com/stonehenge.jpg" },
        { id: "028", title: "Peplos Kore", cat: "Ancient Mediterranean", img: "" },
        { id: "112", title: "Westminster", cat: "Early Europe", img: "https://example.com/westminster.jpg" }
    ];

    const categories = [
        "Global Prehistory", 
        "Ancient Mediterranean", 
        "Early Europe and Colonial Americas"
    ];

    function render() {
        const sectionsWrap = document.getElementById('sections');
        let completed = 0;

        const html = categories.map(cat => {
            const items = artworks.filter(a => a.cat === cat);
            const cardsHtml = items.map(art => {
                const isDone = art.img !== ""; // 如果有图片链接，视为已完成
                if (isDone) completed++;
                
                return `
                    <a href="./posts/${art.id}.html" class="card ${isDone ? 'done' : ''}">
                        <div class="img-box">
                            ${art.img ? `<img src="${art.img}">` : `<span class="not-found">Not Yet Found</span>`}
                        </div>
                    </a>
                `;
            }).join('');

            return `
                <div class="section-title">${cat}</div>
                <div class="grid">${cardsHtml}</div>
            `;
        }).join('');

        sectionsWrap.innerHTML = html;
        
        // 更新进度条和数字
        const percent = (completed / 250) * 100;
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('counter').innerText = `${completed}/250`;
    }

    render();
</script>
</body>
</html>
